<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>회원가입 페이지</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="../jq/signup.js"></script>
</head>

<body>
  <div class="signupform">
    <form method="post">
      <h1>고객가입</h1>
      <label>아이디: </label><input id="idbox" type="text">
      <button>아이디중복확인</button><br>
  
      <label>비밀번호: </label><input id="pwdbox" type="password"><br>
  
      <label>비밀번호확인: </label><input id="pwdcheckbox" type="password"><br>
  
      <label>이름: </label><input id="namebox" type="text"><br>
  
      <label>주소: </label><input id="addressbox" type="text" size="5" readonly>
      <button>우편번호찾기</button><br>
      <input type="text" readonly><br>
      <input type="text" readonly>
      <input id="buildingno" type="hidden" value="1"><br>
  
      <input type="submit" value="가입">
    </form>
  </div>

</body>

</html>
