<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>로그인 페이지</title>
		<link rel="stylesheet" href="../css/login.css">
		<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
		<script src="../jq/login.js"></script>
	</head>
	<body>
		<div class="login">
			<form method="post" action="http://localhost:8888/back/login">
				<div class="table">
					<div class="tr1">
						<div class="td1">
							<label>아이디</label>
						</div>
						<div class="td2">
							<input type="text" class="txtbox" name="id" id="idbox" placeholder="아이디를 입력하세요">
						</div>
					</div>
					<div class="tr2">
						<div class="td1">
							<label>비밀번호</label>
						</div>
						<div class="td2">
							<input type="password" class="txtbox" name="pwd" id="pwdbox" placeholder="비밀번호를 입력하세요">
						</div>
					</div>
					<div class="tr3">
						<div class="td1">
							<button id="">로그인</button>
						</div>
						<div class="td2">
							<a href="searchid.html">아이디찾기</a>
							<a href="searchpwd.html" id="pwdtxt">비밀번호찾기</a>
							<input type="checkbox" checked>
							<label>아이디저장</label>
						</div>
					</div>
				</div>
			</form>
		</div>
	</body>
	
</html>
